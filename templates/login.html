{% extends 'base.html' %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100" dir="rtl">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/static/img/logo.jpeg" alt="شعار مركز التأمين الصحي الوطني" 
        class="h-24 w-auto object-contain mx-auto mb-4 rounded-lg"
        onerror="this.style.display='none'" />
      <h1 class="text-2xl font-bold text-gray-800">مركز التأمين الصحي الوطني</h1>
      <p class="text-gray-500 mt-2">نظام إدارة المشاريع (PMO)</p>
    </div>

    <!-- Login Form -->
    <form method="POST" action="/login" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
        <input type="text" name="username" required
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-500"
          placeholder="أدخل اسم المستخدم" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-500"
          placeholder="أدخل كلمة المرور" />
      </div>

      <button type="submit"
        class="w-full text-white font-bold py-3 rounded-lg transition duration-150 hover:opacity-90"
        style="background-color: #0D7377;">
        تسجيل الدخول
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
      <p class="font-semibold mb-2">بيانات الدخول الافتراضية:</p>
      <p>اسم المستخدم: <code class="bg-gray-200 px-2 py-1 rounded">admin</code></p>
      <p>كلمة المرور: <code class="bg-gray-200 px-2 py-1 rounded">pmo2024</code></p>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      &copy; 2026 مركز التأمين الصحي الوطني - جميع الحقوق محفوظة
    </p>
  </div>
</div>
{% endblock %}
